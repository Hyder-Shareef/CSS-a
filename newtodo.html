<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f8;
      }
      .todo-container {
        width: 100%;
        max-width: 400px;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      .todo-container h2 {
        margin-bottom: 16px;
        text-align: center;
        color: #333;
      }
      .todo-input {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .todo-input input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
      }
      .todo-input input:focus {
        border-color: #000dff;
      }
      .todo-input button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        background: #003062;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
      .todo-input button:hover {
        background: #007bff;
      }
      .update-btn {
        background: #28a745 !important;
      }
      .update-btn:hover {
        background: #218838 !important;
      }
      .todo-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .todo-list li {
        padding: 10px 12px;
        border-radius: 6px;
        background: #f1f3f5;
        margin-bottom: 8px;
        font-size: 14px;
        color: #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .todo-buttons button {
        padding: 4px 8px;
        margin-left: 5px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .delete-btn {
        background: #dc3545;
        color: white;
      }
      .edit-btn {
        background: #007bff;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="todo-container">
      <h2>Todo App</h2>

      <form class="todo-input" onsubmit="addTodo(event)">
        <input id="userTodoInput" type="text" placeholder="Enter a task..." />
        <button type="submit" id="add-button">Add</button>
      </form>

      <ul id="todo-list" class="todo-list"></ul>
    </div>

    <script>
      let todos = [
        { id: 1, title: "first todo" },
        { id: 2, title: "second todo" },
        { id: 3, title: "third one" },
      ];

      let editingId = null;  // Tracks which todo is being edited

      function addTodo(event) {
        event.preventDefault();
        let input = document.getElementById("userTodoInput");
        let inputValue = input.value.trim();

        if (inputValue === "") return;

        if (editingId) {
          // Update mode
          let todo = todos.find(t => t.id === editingId);
          todo.title = inputValue;
          input.value = "";
          document.getElementById("add-button").textContent = "Add";
          editingId = null;
        } else {
          // Add mode
          todos.push({ id: todos.length + 1, title: inputValue });
          input.value = "";
        }
        showTodos();
      }

      function showTodos() {
        let todosList = document.getElementById("todo-list");
        todosList.innerHTML = "";
        for (let i = 0; i < todos.length; i++) {
          todosList.innerHTML += `
            <li>
              ${todos[i].title}
              <div class="todo-buttons">
                <button class="edit-btn" onclick="editTodo(${todos[i].id})">Edit</button>
                <button class="delete-btn" onclick="deleteTodo(${todos[i].id})">Delete</button>
              </div>
            </li>
          `;
        }
      }

      function editTodo(id) {
        let todo = todos.find(item => item.id === id);
        let input = document.getElementById("userTodoInput");
        input.value = todo.title;
        input.focus();
        editingId = id;
        document.getElementById("add-button").textContent = "Update";
      }

      function deleteTodo(id) {
        todos = todos.filter(item => item.id !== id);
        showTodos();
      }

      showTodos();
    </script>
  </body>
</html>
